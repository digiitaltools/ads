name: Purge and Sync Redirects

# Workflow berjalan setiap kali ada push yang mengubah file redirect.json
on:
  push:
    paths:
      - 'redirect.json'
  workflow_dispatch: # Memungkinkan menjalankan manual dari tab Actions

jobs:
  purge-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # CONTOH 1: Jika Anda menggunakan Cloudflare untuk Domain Custom
      - name: Purge Cloudflare Cache
        env:
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
          -H "Authorization: Bearer $CF_API_TOKEN" \
          -H "Content-Type: application/json" \
          --data '{"purge_everything":true}'

      # CONTOH 2: Notifikasi (Opsional)
      - name: Success Notification
        run: echo "Redirects have been updated and cache has been purged!"
