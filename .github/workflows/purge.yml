name: Purge Statically Cache
on:
  push:
    paths:
      - 'milet.js'
      - 'redirect.json'

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Statically Purge
        run: |
          # Gunakan endpoint cdn.statically.io dengan parameter purge
          curl -I "https://cdn.statically.io/gh/digiitaltools/ads/main/milet.js?purge"
          curl -I "https://cdn.statically.io/gh/digiitaltools/ads@main/milet.js?purge"
          
          echo "Request purge berhasil dikirim ke Statically."
